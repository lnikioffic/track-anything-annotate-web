services:
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - PREVIEW_WORKER_URL=http://preview-worker:8000
    depends_on:
      - preview-worker

  preview-worker:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEVICE=cpu
    volumes:
      - ./ml_core:/app/ml_core:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_GATEWAY_URL=http://gateway:8080
    depends_on:
      - gateway
